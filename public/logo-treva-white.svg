<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" fill="none">
  <defs>
    <style>
      @keyframes spin-drum {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .drum-rotate {
        animation: spin-drum 6s linear infinite;
        transform-origin: 210px 82px;
      }
    </style>
  </defs>

  <!-- Sombra suelo -->
  <ellipse cx="250" cy="175" rx="190" ry="6" fill="rgba(255,255,255,0.08)"/>

  <!-- Chasis principal -->
  <rect x="60" y="112" width="370" height="10" rx="3" fill="#FFFFFF"/>

  <!-- Cabina -->
  <path d="M385 50 L475 50 Q485 50 485 60 L485 112 L385 112 Z" fill="#FFFFFF"/>
  <!-- Ventana delantera -->
  <path d="M395 62 L440 62 L440 82 L395 82 Z" fill="rgba(255,255,255,0.4)" rx="3"/>
  <!-- Ventana trasera -->
  <path d="M448 62 L475 62 L475 82 L448 62 Z" fill="rgba(255,255,255,0.4)" rx="3"/>
  <!-- Pilar entre ventanas -->
  <rect x="440" y="60" width="8" height="24" fill="#FFFFFF"/>
  <!-- Faro delantero -->
  <rect x="480" y="78" width="5" height="10" rx="1.5" fill="#FFD700" opacity="0.9"/>
  <!-- Bumper -->
  <rect x="478" y="92" width="7" height="18" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Linea naranja cabina -->
  <path d="M385 100 L485 100" stroke="#E85D2C" stroke-width="4" stroke-linecap="round"/>

  <!-- Guardabarros trasero -->
  <path d="M68 112 L128 112 L128 135 Q98 135 68 135 Z" fill="#FFFFFF"/>

  <!-- Tambor mezclador (grupo rotatorio) -->
  <g class="drum-rotate">
    <rect x="105" y="42" width="210" height="80" rx="38" fill="#E85D2C"/>
    <rect x="105" y="42" width="210" height="80" rx="38" fill="url(#drumShade)" opacity="0.3"/>
    <ellipse cx="155" cy="82" rx="4" ry="38" fill="#D9521F" opacity="0.6"/>
    <ellipse cx="210" cy="82" rx="4" ry="40" fill="#D9521F" opacity="0.6"/>
    <ellipse cx="265" cy="82" rx="4" ry="38" fill="#D9521F" opacity="0.6"/>
    <line x1="120" y1="48" x2="120" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="155" y1="42" x2="155" y2="122" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="210" y1="40" x2="210" y2="124" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="265" y1="42" x2="265" y2="122" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="300" y1="48" x2="300" y2="116" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <line x1="130" y1="55" x2="280" y2="110" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="130" y1="110" x2="280" y2="55" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <path d="M130 48 Q210 36 290 48" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none"/>
  </g>

  <!-- Cono frontal del tambor (fijo, no rota) -->
  <path d="M315 45 Q340 60 340 82 Q340 104 315 119" fill="#C94D1F"/>
  <path d="M315 45 Q340 60 340 82 Q340 104 315 119" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  <ellipse cx="336" cy="82" rx="8" ry="30" fill="#FFFFFF"/>
  <ellipse cx="336" cy="82" rx="4" ry="20" fill="rgba(255,255,255,0.6)"/>

  <!-- Rueda trasera -->
  <g>
    <circle cx="108" cy="140" r="22" fill="rgba(255,255,255,0.3)"/>
    <circle cx="108" cy="140" r="15" fill="rgba(255,255,255,0.5)"/>
    <circle cx="108" cy="140" r="6" fill="rgba(255,255,255,0.7)"/>
    <line x1="108" y1="125" x2="108" y2="155" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="93" y1="140" x2="123" y2="140" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>

  <!-- Rueda delantera -->
  <g>
    <circle cx="405" cy="140" r="22" fill="rgba(255,255,255,0.3)"/>
    <circle cx="405" cy="140" r="15" fill="rgba(255,255,255,0.5)"/>
    <circle cx="405" cy="140" r="6" fill="rgba(255,255,255,0.7)"/>
    <line x1="405" y1="125" x2="405" y2="155" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="390" y1="140" x2="420" y2="140" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>

  <!-- Escalon / tanque de aire lateral -->
  <rect x="340" y="116" width="20" height="6" rx="2" fill="rgba(255,255,255,0.5)"/>

  <!-- Texto TREVA -->
  <text x="250" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="white" text-anchor="middle" letter-spacing="4">TREVA</text>
</svg>
